<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Avision Translator Settings</title>
    <link rel="stylesheet" href="options.css">
  </head>
  <body>
    <main>
      <h1>Avision Translator Settings</h1>

      <form id="settingsForm">
        <section>
          <h2>Translation</h2>
          <label>
            Provider
            <select id="provider">
              <option value="libretranslate">LibreTranslate</option>
              <option value="gas">Google Apps Script</option>
              <option value="azure">Azure Translator</option>
              <option value="openai">OpenAI</option>
              <option value="google">Google Cloud Translation</option>
              <option value="deepl">DeepL</option>
            </select>
          </label>

          <label>
            Source language
            <input id="sourceLanguage" type="text" placeholder="auto">
          </label>

          <label>
            Target language
            <select id="targetLanguage">
              <option value="zh-Hant">Chinese (Traditional)</option>
              <option value="zh-Hans">Chinese (Simplified)</option>
              <option value="en">English</option>
              <option value="ja">Japanese</option>
              <option value="ko">Korean</option>
              <option value="ru">Russian</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="es">Spanish</option>
              <option value="pt">Portuguese</option>
            </select>
          </label>

          <label>
            Max characters per page
            <input id="maxCharactersPerPage" type="number" min="1000" step="1000">
          </label>

          <label>
            YouTube caption mode
            <select id="youtubeMode">
              <option value="auto">Auto: track, then live fallback</option>
              <option value="track">Caption track only</option>
              <option value="live">Live visible captions only</option>
            </select>
          </label>

          <label>
            Fallback provider
            <select id="fallbackProvider">
              <option value="libretranslate">LibreTranslate</option>
              <option value="none">None</option>
            </select>
          </label>
        </section>

        <section>
          <h2>Appearance</h2>
          <label>
            Translation font
            <select id="translationFontFamily">
              <option value="Arial, sans-serif">Arial</option>
              <option value="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">Noto Sans TC / Microsoft JhengHei</option>
              <option value="'Microsoft JhengHei', sans-serif">Microsoft JhengHei</option>
              <option value="'PingFang TC', sans-serif">PingFang TC</option>
              <option value="'Times New Roman', serif">Times New Roman</option>
              <option value="Georgia, serif">Georgia</option>
              <option value="'Courier New', monospace">Courier New</option>
            </select>
          </label>

          <div class="twoColumn">
            <label>
              Page translation size
              <input id="pageFontSize" type="number" min="10" max="32" step="1">
            </label>
            <label>
              YouTube caption size
              <input id="youtubeFontSize" type="number" min="14" max="48" step="1">
            </label>
          </div>
        </section>

        <section>
          <h2>LibreTranslate</h2>
          <label>
            Endpoint
            <input id="libreEndpoint" type="url">
          </label>
          <label>
            API key
            <input id="libreApiKey" type="password" autocomplete="off">
          </label>
        </section>

        <section>
          <h2>Google Apps Script</h2>
          <label>
            Web App URL
            <input id="gasEndpoint" type="url" placeholder="https://script.google.com/macros/s/.../exec">
          </label>
        </section>

        <section>
          <h2>Cache</h2>
          <p id="cacheStats">Cache stats not loaded.</p>
          <div class="buttonRow">
            <button id="refreshCache" type="button" class="secondary">Refresh Cache</button>
            <button id="clearYoutubeCache" type="button" class="secondary">Clear YouTube Cache</button>
            <button id="clearAllCache" type="button" class="secondary">Clear All Cache</button>
          </div>
        </section>

        <section>
          <h2>Reserved Providers</h2>
          <label>
            Azure endpoint
            <input id="azureEndpoint" type="url">
          </label>
          <label>
            Azure region
            <input id="azureRegion" type="text">
          </label>
          <label>
            Azure API key
            <input id="azureApiKey" type="password" autocomplete="off">
          </label>
          <label>
            OpenAI model
            <input id="openaiModel" type="text">
          </label>
          <label>
            OpenAI API key
            <input id="openaiApiKey" type="password" autocomplete="off">
          </label>
          <label>
            Google API key
            <input id="googleApiKey" type="password" autocomplete="off">
          </label>
          <label>
            DeepL endpoint
            <input id="deeplEndpoint" type="url">
          </label>
          <label>
            DeepL API key
            <input id="deeplApiKey" type="password" autocomplete="off">
          </label>
        </section>

        <button type="submit">Save Settings</button>
        <p id="status" role="status"></p>
      </form>
    </main>
    <script src="options.js"></script>
  </body>
</html>
