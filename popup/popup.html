<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Avision Translator</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Avision Translator</h1>
        <p id="providerLabel">LibreTranslate</p>
      </header>

      <button id="translatePage" type="button">Translate Page</button>
      <button id="youtubeCaptions" type="button" class="secondary">YouTube Captions</button>
      <button id="toggleTranslations" type="button" class="secondary">Show / Hide</button>
      <button id="openOptions" type="button" class="ghost">Settings</button>

      <p id="status" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
